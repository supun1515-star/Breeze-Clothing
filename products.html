<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Breeze Clothing</title>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        outfit: ["Outfit", "sans-serif"],
                        playfair: ["Playfair Display", "serif"],
                    },
                    colors: {
                        brand: {
                            primary: '#db2777',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-outfit bg-stone-50 text-gray-900 antialiased pt-24 min-h-screen flex flex-col">

    <!-- Solid Navbar for Inner Pages -->
    <nav class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm transition-all duration-300 py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="flex items-center">
                        <img src="assets/images/logo.jpg" alt="Breeze Clothing" class="h-10 md:h-12 w-auto object-contain transition-transform duration-300 hover:scale-105" id="nav-logo-inner">
                    </a>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-gray-600 hover:text-brand-primary transition-colors text-sm tracking-widest uppercase font-medium">Home</a>
                    <a href="products.html" class="text-brand-primary transition-colors text-sm tracking-widest uppercase font-medium">Shop</a>
                    <a href="contact.html" class="text-gray-600 hover:text-brand-primary transition-colors text-sm tracking-widest uppercase font-medium">Contact</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button class="text-gray-900 focus:outline-none" id="mobile-menu-btn-inner">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu (Copy of logic, will be handled by main.js) -->
        <div id="mobile-menu-inner" class="hidden md:hidden absolute top-full left-0 w-full bg-white shadow-xl border-t border-gray-100">
            <div class="px-4 pt-2 pb-6 space-y-1 text-center">
                <a href="index.html" class="block px-3 py-3 text-base font-medium text-gray-600 hover:text-brand-primary hover:bg-gray-50 rounded-md">Home</a>
                <a href="products.html" class="block px-3 py-3 text-base font-medium text-brand-primary bg-gray-50 rounded-md">Shop</a>
                <a href="contact.html" class="block px-3 py-3 text-base font-medium text-gray-600 hover:text-brand-primary hover:bg-gray-50 rounded-md">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="bg-white py-16 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl md:text-5xl font-playfair font-bold text-gray-900 mb-4">Our Collection</h1>
            <p class="text-gray-500 max-w-2xl mx-auto">Discover our carefully curated selection of premium clothing. Easy to style, impossible to ignore.</p>
        </div>
    </div>

    <!-- Shop Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        <!-- Toolbar -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 pb-6 border-b border-gray-200 gap-4">
            <div class="text-sm text-gray-500">Showing <span class="items-count font-bold text-gray-900">0</span> results</div>
            <div class="flex items-center space-x-4">
                <select class="form-select block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-brand-primary focus:border-brand-primary sm:text-sm rounded-md bg-white border cursor-pointer outline-none">
                    <option>Sort by Latest</option>
                    <option>Sort by Price: Low to High</option>
                    <option>Sort by Price: High to Low</option>
                    <option>Sort by Popularity</option>
                </select>
            </div>
        </div>

        <!-- Product Grid -->
        <!-- Product Grid Container for JS -->
        <!-- Meka JS eken auto load wenawa (assets/js/products.js) 100k dammath meke penwai -->
        <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-4 sm:gap-x-8 gap-y-10" id="shop-product-grid">
            <!-- Data will be populated here -->
        </div>
    </main>

    <!-- Footer - Simplified for inner pages -->
    <footer class="bg-gray-900 border-t border-gray-800 text-white py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0">
                <span class="font-playfair text-2xl font-bold block">Breeze</span>
            </div>
            <p class="text-gray-500 text-sm">&copy; 2026 Breeze Clothing. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/products.js"></script>
</body>
</html>
